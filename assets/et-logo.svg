<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Coach E.T — Eylem Tarhan Personal Training Ankara">
  <defs>
    <path id="arcTop" d="M 58 250 A 192 192 0 0 1 442 250"/>
    <path id="arcBot" d="M 58 250 A 192 192 0 0 0 442 250"/>
  </defs>

  <!-- Outermost faint halo -->
  <circle cx="250" cy="250" r="242" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.2"/>

  <!-- Fine dotted decorative ring -->
  <circle cx="250" cy="250" r="232" fill="none" stroke="#fff" stroke-width="1.2"
          stroke-dasharray="2 11" stroke-linecap="round" opacity="0.65"/>

  <!-- Main bold ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#fff" stroke-width="2.5"/>

  <!-- Inner thin ring -->
  <circle cx="250" cy="250" r="212" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.75"/>

  <!-- Diamond accents at 3 o'clock and 9 o'clock on main ring -->
  <polygon points="24,250 31,243 38,250 31,257" fill="#fff"/>
  <polygon points="462,250 469,243 476,250 469,257" fill="#fff"/>

  <!-- Thin horizontal strokes beside diamonds -->
  <line x1="13" y1="250" x2="22" y2="250" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="478" y1="250" x2="487" y2="250" stroke="#fff" stroke-width="1" opacity="0.5"/>

  <!-- Central crest frame -->
  <rect x="148" y="168" width="204" height="164" fill="none" stroke="#fff" stroke-width="1.5"/>

  <!-- Corner accent lines (bracket style) extending out from crest frame -->
  <line x1="128" y1="168" x2="148" y2="168" stroke="#fff" stroke-width="1.5"/>
  <line x1="352" y1="168" x2="372" y2="168" stroke="#fff" stroke-width="1.5"/>
  <line x1="128" y1="332" x2="148" y2="332" stroke="#fff" stroke-width="1.5"/>
  <line x1="352" y1="332" x2="372" y2="332" stroke="#fff" stroke-width="1.5"/>

  <!-- Thin accent lines inside crest frame (above / below monogram) -->
  <line x1="163" y1="192" x2="337" y2="192" stroke="#fff" stroke-width="0.7" opacity="0.55"/>
  <line x1="163" y1="308" x2="337" y2="308" stroke="#fff" stroke-width="0.7" opacity="0.55"/>

  <!-- ET Monogram -->
  <text x="250" y="256" text-anchor="middle" dominant-baseline="middle"
        font-family="'Playfair Display','Georgia','Times New Roman',serif"
        font-weight="700" font-size="128" fill="#fff" letter-spacing="-3">ET</text>

  <!-- ANKARA — top arc -->
  <text font-family="'Helvetica Neue','Arial',sans-serif"
        font-weight="800" font-size="27" fill="#fff" letter-spacing="14">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">ANKARA</textPath>
  </text>

  <!-- COACH · E.T — bottom arc -->
  <text font-family="'Helvetica Neue','Arial',sans-serif"
        font-weight="400" font-size="22" fill="#fff" letter-spacing="9" opacity="0.9">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">COACH · E.T</textPath>
  </text>
</svg>
